<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>crosssection</title>
    <!-- Pyodide runtime + stdlib + numpy/scipy/shapely come from jsdelivr.
         Open the connection eagerly so it's warm by the time the worker boots. -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Hidden by default. Only shown when the FEM worker can't start
         (timeout or runtime error during boot). The editor stays usable
         until then; results just stay as "—" while loading. -->
    <div id="boot-overlay" class="boot-overlay hidden">
      <div class="boot-card error" id="boot-card"></div>
    </div>

    <main>
      <aside class="left-col" id="start-pane">
        <section class="left-section" id="start-section">
          <button class="section-toggle" id="start-pane-toggle" type="button" aria-label="toggle presets">
            <span class="section-title">Presets</span>
            <span class="chevron" aria-hidden="true">▾</span>
          </button>
          <div class="section-body">
            <div class="start-list">
              <div class="start-row">
                <span class="start-row-label">Round</span>
                <button class="start-btn" data-preset="rod"  type="button" title="Solid"><span class="start-glyph">●</span><span class="start-tag">solid</span></button>
                <button class="start-btn" data-preset="pipe" type="button" title="Hollow"><span class="start-glyph">◎</span><span class="start-tag">hollow</span></button>
              </div>
              <div class="start-row">
                <span class="start-row-label">Rect</span>
                <button class="start-btn" data-preset="rect" type="button" title="Solid"><span class="start-glyph">■</span><span class="start-tag">solid</span></button>
                <button class="start-btn" data-preset="box"  type="button" title="Hollow"><span class="start-glyph">▢</span><span class="start-tag">hollow</span></button>
              </div>
              <div class="start-row">
                <span class="start-row-label">Frame</span>
                <button class="start-btn" data-preset="extrusion" type="button">2020</button>
              </div>
            </div>
          </div>
        </section>

        <section class="results-section">
          <div class="readouts">
            <div class="readout">
              <div class="readout-label">A</div>
              <div class="readout-val" id="area">—</div>
              <div class="readout-unit">mm²</div>
            </div>
            <div class="readout">
              <div class="readout-label">I<sub>x</sub></div>
              <div class="readout-val" id="ix">—</div>
              <div class="readout-unit">mm⁴</div>
            </div>
            <div class="readout">
              <div class="readout-label">I<sub>y</sub></div>
              <div class="readout-val" id="iy">—</div>
              <div class="readout-unit">mm⁴</div>
            </div>
            <div class="readout">
              <div class="readout-label">J</div>
              <div class="readout-val" id="j">—</div>
              <div class="readout-unit">mm⁴</div>
            </div>
          </div>
          <div class="status">
            <div id="status"></div>
          </div>
        </section>
      </aside>

      <div class="canvas-col">
        <div class="canvas-toolbar">
          <button class="tool-btn" data-tool="paint-rect" type="button">Paint Rect</button>
          <button class="tool-btn" data-tool="erase-rect" type="button">Erase Rect</button>
          <button class="tool-btn" data-tool="add-hole"   type="button">Add Hole</button>
          <span class="toolbar-sep"></span>
          <div class="symmetrize-group">
            <button class="tool-btn" id="symmetrize-btn" type="button">Symmetrize…</button>
            <div class="symmetrize-popup" id="symmetrize-popup" hidden>
              <button class="sym-option" data-sym="D1" type="button">
                <img class="sym-icon" src="/sym-icon-mirror.svg" alt="" aria-hidden="true"/>
                <span class="sym-label">Mirror</span>
              </button>
              <button class="sym-option" data-sym="D4" type="button">
                <img class="sym-icon" src="/sym-icon-extrusion.svg" alt="" aria-hidden="true"/>
                <span class="sym-label">Extrusion</span>
              </button>
            </div>
          </div>
          <span class="toolbar-sep"></span>
          <label class="snap-toggle">
            <input type="checkbox" id="snap-toggle" checked />
            <span>Snap to grid</span>
            <kbd class="kbd-hint">Space</kbd>
          </label>
        </div>
        <div class="canvas-wrap">
          <canvas id="cv" width="480" height="480"></canvas>
          <form class="size-input-overlay" id="size-input" hidden></form>
        </div>
        <div class="canvas-status" id="canvas-status"></div>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
