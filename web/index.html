<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>crosssection</title>
    <!-- Pyodide runtime + stdlib + numpy/scipy/shapely come from jsdelivr.
         Open the connection eagerly so it's warm by the time the worker boots. -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main>
      <aside class="start-pane" id="start-pane">
        <button class="start-pane-toggle" id="start-pane-toggle" type="button" aria-label="toggle start pane">◀</button>
        <div class="start-pane-content">
          <h3>Start from</h3>
          <ul class="start-list">
            <li><button class="start-btn" data-preset="rod"       type="button">Rod</button></li>
            <li><button class="start-btn" data-preset="rect"      type="button">Rectangle</button></li>
            <li><button class="start-btn" data-preset="extrusion" type="button">Extrusion</button></li>
          </ul>
        </div>
      </aside>

      <div class="canvas-wrap">
        <canvas id="cv" width="480" height="480"></canvas>
        <form class="size-input-overlay" id="size-input" hidden></form>
      </div>

      <aside class="panel">
        <section class="ops">
          <div class="ops-row">
            <button id="op-add-rect" class="op-btn">+ Rect</button>
            <button id="op-add-poly" class="op-btn">+ Polygon</button>
          </div>
          <div class="ops-row">
            <button id="op-add-circle-hole" class="op-btn">− Circle hole</button>
            <button id="op-add-poly-hole" class="op-btn">− Polygon hole</button>
          </div>
        </section>

        <section class="prim-list">
          <h3>Primitives</h3>
          <ul id="prim-list"></ul>
        </section>

        <section class="readouts">
          <div class="readout">
            <div class="readout-label">I<sub>x</sub></div>
            <div class="readout-val" id="ix">—</div>
            <div class="readout-unit">mm⁴</div>
          </div>
          <div class="readout">
            <div class="readout-label">I<sub>y</sub></div>
            <div class="readout-val" id="iy">—</div>
            <div class="readout-unit">mm⁴</div>
          </div>
          <div class="readout">
            <div class="readout-label">J</div>
            <div class="readout-val" id="j">—</div>
            <div class="readout-unit">mm⁴</div>
          </div>
        </section>

        <section class="status">
          <div id="status">starting Python…</div>
          <div class="hint">Drag handles to edit. Right-click a vertex to delete. Click an empty edge handle to insert a vertex.</div>
        </section>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
